name: Daily Weir Download

on:
  schedule:
    - cron: "40 15 * * *"
  workflow_dispatch:

concurrency:
  group: daily-weir-download
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::cli, any::magick, any::httr2, any::lubridate

      - name: Run weir download
        run: Rscript weir_download.R

      - name: Commit and push changes
        run: |
          if git diff --quiet -- pics/ README.md; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pics/ README.md
          git commit -m "chore: daily weir image update $(date -u +%Y-%m-%d)"
          git push